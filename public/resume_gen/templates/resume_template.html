<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>[PAGE_TITLE]</title>
    <style>
    @page {
        size: A4 portrait;
        margin: 0; 
    }
    body {
        margin: 0;
        padding: 0;
        background-color: #525659;
        display: flex;
        justify-content: center;
        font-family: "Times New Roman", serif;
        -webkit-print-color-adjust: exact;
    }
    .resume-container {
        width: 21cm;
        min-height: 29.7cm;
        margin: 1cm auto;
        padding: 0.75cm 1cm 1cm 1cm;
        background-color: white;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
        box-sizing: border-box;
        font-size: 12px;
        line-height: 1.3;
        color: black;
    }
    
    @media print {
        body {
            background-color: white;
            display: block;
        }
        .resume-container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0.75cm 1cm 1cm 1cm;
            box-shadow: none;
            zoom: 100%; 
        }
    }

    h1, h2, h3 { margin: 0; padding: 0; }
    h1 {
        font-size: 25px;
        text-transform: uppercase;
        font-weight: bold;
        margin-bottom: 2px;
    }
    h2 {
        display: flex;
        width: 100%;
        align-items: center;
        white-space: nowrap;
        font-size: 15px;
        text-transform: uppercase;
        font-weight: bold;
        margin: 0;
        margin-bottom: 8px;
        margin-top: 8px;
        padding-top: 4px;
        border-top: 1px solid #ddd;
    }
    h2::after {
        content: '';
        flex: 1;
        border-bottom: 2px solid #333;
        margin-left: 6px;
        margin-top: 8px;
    }
    h3 {
        font-size: 15px;
        font-weight: normal;
        margin-bottom: 2px;
        margin-top: -1px; 
    }
    
    .header-table { width: 100%; margin-bottom: 5px; border-collapse: collapse; }
    .header-left { text-align: left; vertical-align: top; }
    .header-right { 
        text-align: right; 
        font-size: 10px; 
        line-height: 1.5; 
        vertical-align: top; 
        padding-top: 6px;
    }
    
    .section { margin-bottom: 10px; }
    
    .entry { margin-bottom: 4px; }
    
    .job-title, .degree-info {
        font-weight: bold;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end; 
        margin-bottom: 2px;
    }
    .job-title span, .degree-info span {
        font-weight: bold; 
        font-size: 12px; 
    }

    .location, .institution {
        font-size: 11px;
        margin-top: 2px;
        margin-bottom: 5px;
    }
    
    ul {
        margin: 5px 0;
        padding-left: 20px;
        list-style-type: disc;
    }
    li { margin-bottom: 2px; }
    
    .grid-container {
        display: flex;
        flex-wrap: wrap;
        margin-top: 0;
    }
    .grid-item {
        width: 50%;
        box-sizing: border-box;
        padding-right: 10px;
        margin-bottom: 4px;
        font-size: 11px;
    }
    .grid-item span:first-child {
        font-weight: bold;
    }
    
    .skills-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px 20px;
        padding-left: 20px;
        list-style-type: disc;
        margin: 5px 0;
        margin-top: 5px;
        font-size: 12px;
    }
    .skills-grid li {
        margin-bottom: -3px;
    }
    </style>
</head>
<body>
    <div class="resume-container">
        <table class="header-table">
            <tr>
                <td class="header-left">
                    <h1>[FULL_NAME]</h1>
                    <h3>[JOB_TITLE]</h3>
                </td>
                <td class="header-right">
                    [HEADER_LINKS]
                </td>
            </tr>
        </table>
[CONTENT]
    </div>
</body>
</html>
